<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SYNTHEX</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            width: 100%;
            max-width: 440px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            border-radius: 12px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .hidden {
            display: none;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .code-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }

        .code-input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .resend-section {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }

        .resend-link {
            color: #4f46e5;
            cursor: pointer;
            text-decoration: none;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo-section">
            <img src="/logo.png" alt="SYNTHEX" class="logo">
            <h1>Reset Password</h1>
        </div>

        <!-- Step 1: Request Reset -->
        <div id="step1" class="step active">
            <p class="subtitle">Enter your email address and we'll send you a verification code.</p>
            
            <div id="message1" class="message hidden"></div>
            
            <form id="requestForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
                
                <button type="submit" class="btn" id="requestBtn">
                    Send Verification Code
                </button>
            </form>
            
            <div class="back-link">
                <a href="/dashboard.html">Back to Login</a>
            </div>
        </div>

        <!-- Step 2: Enter Code -->
        <div id="step2" class="step">
            <p class="subtitle">Enter the 6-digit code we sent to <span id="emailDisplay"></span></p>
            
            <div id="message2" class="message hidden"></div>
            
            <form id="verifyForm">
                <div class="code-inputs">
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="code-input" maxlength="1" pattern="[0-9]" required>
                </div>
                
                <button type="submit" class="btn" id="verifyBtn">
                    Verify Code
                </button>
            </form>
            
            <div class="resend-section">
                Didn't receive the code? 
                <a href="#" class="resend-link" id="resendLink">Resend</a>
                <span id="resendTimer" class="hidden">(<span id="countdown">60</span>s)</span>
            </div>
            
            <div class="back-link">
                <a href="#" onclick="showStep(1); return false;">Use different email</a>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" class="step">
            <p class="subtitle">Enter your new password</p>
            
            <div id="message3" class="message hidden"></div>
            
            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required 
                           minlength="8" placeholder="At least 8 characters">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                           placeholder="Confirm your password">
                </div>
                
                <button type="submit" class="btn" id="resetBtn">
                    Reset Password
                </button>
            </form>
        </div>

        <!-- Step 4: Success -->
        <div id="step4" class="step">
            <div class="success-message">
                <h2 style="margin-bottom: 8px;">Password Reset Successful!</h2>
                <p>Your password has been successfully reset.</p>
            </div>
            
            <a href="/dashboard.html" class="btn" style="display: block; text-align: center; text-decoration: none;">
                Go to Login
            </a>
        </div>
    </div>

    <script src="/js/breadcrumb.js"></script>
    <script src="/js/ui-helpers.js"></script>
    <script src="/js/footer.js"></script>
    <script>
        let currentStep = 1;
        let userEmail = '';
        let resetToken = '';
        let resendTimer = null;

        function showStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
            currentStep = step;
        }

        function showMessage(stepNum, message, isError = false) {
            const messageEl = document.getElementById(`message${stepNum}`);
            messageEl.textContent = message;
            messageEl.className = `message ${isError ? 'error-message' : 'success-message'}`;
            messageEl.classList.remove('hidden');
            
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 5000);
        }

        // Handle code input auto-advance
        document.querySelectorAll('.code-input').forEach((input, index, inputs) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Step 1: Request Reset
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const button = document.getElementById('requestBtn');
            
            window.uiHelpers.setButtonLoading(button, true);
            
            try {
                const response = await fetch('/api/auth/reset-password/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    userEmail = email;
                    document.getElementById('emailDisplay').textContent = email;
                    showMessage(1, 'Verification code sent to your email!', false);
                    setTimeout(() => showStep(2), 1500);
                    startResendTimer();
                } else {
                    showMessage(1, data.error || 'Failed to send verification code', true);
                }
            } catch (error) {
                showMessage(1, 'Network error. Please try again.', true);
            } finally {
                window.uiHelpers.setButtonLoading(button, false);
            }
        });

        // Step 2: Verify Code
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codeInputs = document.querySelectorAll('.code-input');
            const code = Array.from(codeInputs).map(input => input.value).join('');
            const button = document.getElementById('verifyBtn');
            
            if (code.length !== 6) {
                showMessage(2, 'Please enter all 6 digits', true);
                return;
            }
            
            window.uiHelpers.setButtonLoading(button, true);
            
            try {
                const response = await fetch('/api/auth/reset-password/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, code })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resetToken = data.token;
                    showMessage(2, 'Code verified successfully!', false);
                    setTimeout(() => showStep(3), 1500);
                } else {
                    showMessage(2, data.error || 'Invalid verification code', true);
                }
            } catch (error) {
                showMessage(2, 'Network error. Please try again.', true);
            } finally {
                window.uiHelpers.setButtonLoading(button, false);
            }
        });

        // Step 3: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const button = document.getElementById('resetBtn');
            
            if (password !== confirmPassword) {
                showMessage(3, 'Passwords do not match', true);
                return;
            }
            
            if (password.length < 8) {
                showMessage(3, 'Password must be at least 8 characters', true);
                return;
            }
            
            window.uiHelpers.setButtonLoading(button, true);
            
            try {
                const response = await fetch('/api/auth/reset-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showStep(4);
                } else {
                    showMessage(3, data.error || 'Failed to reset password', true);
                }
            } catch (error) {
                showMessage(3, 'Network error. Please try again.', true);
            } finally {
                window.uiHelpers.setButtonLoading(button, false);
            }
        });

        // Resend code functionality
        function startResendTimer() {
            const resendLink = document.getElementById('resendLink');
            const timerSpan = document.getElementById('resendTimer');
            const countdown = document.getElementById('countdown');
            
            resendLink.classList.add('disabled');
            timerSpan.classList.remove('hidden');
            
            let seconds = 60;
            countdown.textContent = seconds;
            
            resendTimer = setInterval(() => {
                seconds--;
                countdown.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(resendTimer);
                    resendLink.classList.remove('disabled');
                    timerSpan.classList.add('hidden');
                }
            }, 1000);
        }

        document.getElementById('resendLink').addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (e.target.classList.contains('disabled')) return;
            
            try {
                const response = await fetch('/api/auth/reset-password/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                
                if (response.ok) {
                    showMessage(2, 'New verification code sent!', false);
                    startResendTimer();
                } else {
                    showMessage(2, 'Failed to resend code', true);
                }
            } catch (error) {
                showMessage(2, 'Network error', true);
            }
        });
    </script>
</body>
</html>
