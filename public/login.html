<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SYNTHEX Marketing Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="h-full gradient-bg text-white">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full space-y-8">
            <!-- Logo and Title -->
            <div class="text-center">
                <h1 class="text-4xl font-bold mb-2">SYNTHEX</h1>
                <p class="text-gray-400">Marketing Automation Platform</p>
            </div>

            <!-- Login/Register Forms Container -->
            <div id="authContainer" class="glass rounded-xl p-8">
                <!-- Login Form -->
                <div id="loginFormContainer">
                    <h2 class="text-2xl font-bold mb-6">Sign In</h2>
                    
                    <form id="loginForm" class="space-y-6">
                        <div>
                            <label for="loginEmail" class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" id="loginEmail" name="email" required
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="your@email.com">
                        </div>
                        
                        <div>
                            <label for="loginPassword" class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" id="loginPassword" name="password" required
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="••••••••">
                        </div>
                        
                        <button type="submit" 
                                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">
                            Sign In
                        </button>
                    </form>

                    <div class="mt-6 text-center">
                        <p class="text-sm text-gray-400">
                            Don't have an account? 
                            <a href="#" onclick="toggleForm('register')" class="text-blue-400 hover:text-blue-300">Sign up</a>
                        </p>
                        <p class="text-sm text-gray-400 mt-2">
                            <a href="/reset-password.html" class="text-blue-400 hover:text-blue-300">Forgot password?</a>
                        </p>
                    </div>
                </div>

                <!-- Register Form (Hidden by default) -->
                <div id="registerFormContainer" class="hidden">
                    <h2 class="text-2xl font-bold mb-6">Create Account</h2>
                    
                    <form id="registerForm" class="space-y-6">
                        <div>
                            <label for="registerName" class="block text-sm font-medium mb-2">Name</label>
                            <input type="text" id="registerName" name="name"
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="Your Name">
                        </div>

                        <div>
                            <label for="registerEmail" class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" id="registerEmail" name="email" required
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="your@email.com">
                        </div>
                        
                        <div>
                            <label for="registerPassword" class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" id="registerPassword" name="password" required
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="••••••••">
                            <p class="text-xs text-gray-400 mt-1">At least 8 characters, including uppercase, lowercase, number, and special character</p>
                        </div>

                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required
                                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="••••••••">
                        </div>
                        
                        <button type="submit" 
                                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">
                            Create Account
                        </button>
                    </form>

                    <div class="mt-6 text-center">
                        <p class="text-sm text-gray-400">
                            Already have an account? 
                            <a href="#" onclick="toggleForm('login')" class="text-blue-400 hover:text-blue-300">Sign in</a>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Error/Success Messages -->
            <div id="message" class="hidden glass rounded-lg p-4"></div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('synthex_token');

        // Check if user is already logged in
        if (authToken) {
            verifyToken();
        }

        // Toggle between login and register forms
        function toggleForm(form) {
            const loginContainer = document.getElementById('loginFormContainer');
            const registerContainer = document.getElementById('registerFormContainer');
            
            if (form === 'register') {
                loginContainer.classList.add('hidden');
                registerContainer.classList.remove('hidden');
            } else {
                loginContainer.classList.remove('hidden');
                registerContainer.classList.add('hidden');
            }
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('synthex_token', authToken);
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                console.error('Login error:', error);
            }
        });

        // Register form handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('synthex_token', authToken);
                    showMessage('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    if (data.details && Array.isArray(data.details)) {
                        const errors = data.details.map(d => d.msg).join(', ');
                        showMessage(errors, 'error');
                    } else {
                        showMessage(data.error || 'Registration failed', 'error');
                    }
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                console.error('Registration error:', error);
            }
        });

        // Verify token
        async function verifyToken() {
            try {
                const response = await fetch('/api/auth/verify', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.valid) {
                    window.location.href = '/dashboard';
                } else {
                    localStorage.removeItem('synthex_token');
                    authToken = null;
                }
            } catch (error) {
                console.error('Token verification failed:', error);
                localStorage.removeItem('synthex_token');
                authToken = null;
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `glass rounded-lg p-4 ${type === 'error' ? 'text-red-400' : 'text-green-400'}`;
            messageEl.classList.remove('hidden');
            
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
