# =============================================================================
# Synthex Horizontal Pod Autoscaler
# Scales between 2-6 replicas based on CPU/memory usage
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: synthex-app-hpa
  namespace: synthex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: synthex-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
