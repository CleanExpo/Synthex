# =============================================================================
# Synthex Ingress — routes external traffic into the cluster
# Uses NGINX ingress controller (installed via setup.sh)
# =============================================================================
#
# Local access after setup: http://localhost:8080
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synthex-ingress
  namespace: synthex
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: synthex-app
                port:
                  number: 80
