# =============================================================================
# Synthex kind (Kubernetes in Docker) Cluster Configuration
# Local development and testing cluster
# =============================================================================
#
# CREATE CLUSTER:
#   kind create cluster --config k8s/kind-config.yaml
#
# DELETE CLUSTER:
#   kind delete cluster --name synthex-local
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: synthex-local

nodes:
  # Control plane with ingress port mappings
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP — access app at http://localhost:9080
      - containerPort: 80
        hostPort: 9080
        protocol: TCP
      # HTTPS — access app at https://localhost:9443
      - containerPort: 443
        hostPort: 9443
        protocol: TCP

  # Worker nodes for app pods
  - role: worker
  - role: worker
