name: CI Verify

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

jobs:
  ci-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract and UI wiring verification
        run: npm run ci:verify
