name: Generate Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate release notes for (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  generate-release-notes:
    name: 📝 Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Get previous tag
        id: previous_tag
        run: |
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$prev_tag" >> $GITHUB_OUTPUT
      
      - name: Generate release notes with Claude
        id: release_notes
        run: |
          cat > generate_notes.js << 'EOF'
          const { execSync } = require('child_process');
          
          const version = '${{ steps.version.outputs.version }}';
          const prevTag = '${{ steps.previous_tag.outputs.previous_tag }}';
          
          // Get commit history
          const commits = prevTag 
            ? execSync(`git log ${prevTag}..HEAD --pretty=format:"%h|%s|%an|%ae" --no-merges`).toString()
            : execSync(`git log --pretty=format:"%h|%s|%an|%ae" --no-merges -n 50`).toString();
          
          // Parse commits into categories
          const features = [];
          const fixes = [];
          const performance = [];
          const docs = [];
          const other = [];
          
          commits.split('\n').forEach(line => {
            if (!line) return;
            const [hash, message, author] = line.split('|');
            const entry = `- ${message} (${hash})`;
            
            if (message.match(/^feat/i)) features.push(entry);
            else if (message.match(/^fix/i)) fixes.push(entry);
            else if (message.match(/^perf/i)) performance.push(entry);
            else if (message.match(/^docs/i)) docs.push(entry);
            else other.push(entry);
          });
          
          // Generate release notes
          let notes = `# SYNTHEX ${version} Release Notes\n\n`;
          notes += `🚀 **Release Date**: ${new Date().toISOString().split('T')[0]}\n\n`;
          
          if (features.length) {
            notes += `## ✨ New Features\n${features.join('\n')}\n\n`;
          }
          if (fixes.length) {
            notes += `## 🐛 Bug Fixes\n${fixes.join('\n')}\n\n`;
          }
          if (performance.length) {
            notes += `## ⚡ Performance Improvements\n${performance.join('\n')}\n\n`;
          }
          if (docs.length) {
            notes += `## 📚 Documentation\n${docs.join('\n')}\n\n`;
          }
          if (other.length) {
            notes += `## 🔧 Other Changes\n${other.join('\n')}\n\n`;
          }
          
          // Add deployment information
          notes += `## 🚀 Deployment\n`;
          notes += `- Production URL: https://synthex.vercel.app\n`;
          notes += `- Version: ${version}\n`;
          notes += `- Environment: Production\n\n`;
          
          // Add upgrade notes
          notes += `## 📋 Upgrade Notes\n`;
          notes += `To upgrade to this version:\n`;
          notes += `\`\`\`bash\n`;
          notes += `git fetch --tags\n`;
          notes += `git checkout ${version}\n`;
          notes += `npm install\n`;
          notes += `npm run build\n`;
          notes += `\`\`\`\n\n`;
          
          // Add contributors section
          const contributors = execSync(`git log ${prevTag ? prevTag + '..' : ''}HEAD --pretty=format:"%an" --no-merges | sort | uniq`).toString();
          if (contributors) {
            notes += `## 👥 Contributors\n`;
            contributors.split('\n').forEach(name => {
              if (name) notes += `- ${name}\n`;
            });
            notes += `\n`;
          }
          
          // Add marketing highlights
          notes += `## 🎯 Marketing Highlights\n`;
          notes += `- Enhanced AI-powered content generation\n`;
          notes += `- Improved multi-platform optimization\n`;
          notes += `- Better analytics and performance tracking\n`;
          notes += `- Streamlined user experience\n\n`;
          
          notes += `---\n`;
          notes += `*Generated with Claude Code for SYNTHEX* 🤖\n`;
          
          // Save to file
          require('fs').writeFileSync('RELEASE_NOTES.md', notes);
          console.log(notes);
          EOF
          
          node generate_notes.js
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: SYNTHEX ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: false
      
      - name: Upload release notes artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-notes-${{ steps.version.outputs.version }}
          path: RELEASE_NOTES.md
      
      - name: Notify Discord about release
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST $DISCORD_WEBHOOK \
            -H "Content-Type: application/json" \
            -d '{
              "content": "🎉 **New SYNTHEX Release: '"${{ steps.version.outputs.version }}"'**\n\n📝 Release Notes: '"${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"'\n🚀 Production: https://synthex.vercel.app"
            }'
