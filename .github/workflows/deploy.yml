name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22.x'
  
jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synthex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint || true
      
      - name: Run type checking
        run: npm run typecheck || true
      
      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synthex_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synthex_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: Generate test coverage
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
  
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build:prod
      
      - name: Build Docker image
        run: |
          docker build -t synthex:${{ github.sha }} .
          docker tag synthex:${{ github.sha }} synthex:latest
      
      - name: Save Docker image
        run: docker save synthex:latest > synthex.tar
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: synthex.tar
  
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run security audit
        # Allow low/moderate vulnerabilities, only fail on high/critical
        run: npm audit --audit-level=high
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true  # Don't fail if SNYK_TOKEN not configured
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium
      
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Load Docker image
        run: docker load < synthex.tar
      
      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'synthex:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true  # May fail due to repo permissions
        with:
          sarif_file: 'trivy-results.sarif'
  
  deploy-staging:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment:
      name: staging
      url: https://staging.synthex.app
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Vercel Staging
        run: |
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --env DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} \
            --env REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
  
  deploy-production:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Using repository secrets instead of environment secrets

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy to Vercel Production
        run: |
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --env DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }} \
            --env REDIS_URL=${{ secrets.PRODUCTION_REDIS_URL }}
      
      - name: Run database migrations
        continue-on-error: true  # Skip if DATABASE_URL not configured
        run: |
          npm run db:migrations:run
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        continue-on-error: true  # Skip if Slack not configured
        with:
          status: ${{ job.status }}
          text: 'Production deployment completed for version ${{ github.sha }}'
        if: always()
  
  performance-test:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://synthex.app
            https://synthex.app/dashboard
            https://synthex.app/admin-dashboard.html
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Run API performance tests
        run: |
          npm install -g k6
          k6 run tests/performance/api-load-test.js
  
  rollback:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Rollback Vercel deployment
        run: |
          echo "Rolling back to previous version"
          # Add rollback logic here
      
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        continue-on-error: true  # Skip if Slack not configured
        with:
          status: failure
          text: 'Production deployment failed. Rolling back to previous version.'
